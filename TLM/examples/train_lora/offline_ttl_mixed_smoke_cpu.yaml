### model
model_name_or_path: llamafactory/tiny-random-Llama-3

### method
stage: ttl
do_train: true
do_predict: true
finetuning_type: lora
lora_target: q_proj,v_proj

### ttl parameters
setting: offline_ttl
threshold: 0.1
lamb: 0.1

### dataset
dataset: agriculture_5k_advharm_40
eval_dataset: agriculture_5k_advharm_40
template: llama3
cutoff_len: 64
max_samples: 1
overwrite_cache: true
preprocessing_num_workers: 1

### output
output_dir: output/ttl_smoke_cpu/agriculture_5k_advharm_40
run_name: ttl_smoke_cpu
logging_steps: 1
save_steps: 1
plot_loss: false
overwrite_output_dir: true

### train
per_device_train_batch_size: 1
gradient_accumulation_steps: 1
learning_rate: 1.0e-4
max_steps: 1
num_train_epochs: 1.0
lr_scheduler_type: constant
warmup_ratio: 0.0
bf16: false
fp16: false
ddp_timeout: 180000000

### eval
do_eval: null

### predict
temperature: 0.0
do_sample: false
max_new_tokens: 8
per_device_eval_batch_size: 1
predict_with_generate: true

report_to: none
